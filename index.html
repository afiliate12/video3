<!DOCTYPE html>
<html lang="id">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Video Player Dinamis</title>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; overflow: hidden; height: 100vh; background: #000; }

#bgVideo {
    position: fixed;
    top: 0;
    left: 0;
    width: 100%;
    height: 100%;
    object-fit: cover;
    z-index: 1;
    cursor: pointer;
}

.overlay {
    position: relative;
    height: 100vh;
    display: flex;
    flex-direction: column;
    justify-content: space-between;
    padding: 20px;
    background: linear-gradient(45deg, rgba(255,0,150,0.2), rgba(0,204,255,0.2));
    animation: gradientShift 8s ease infinite;
    z-index: 2;
    pointer-events: none;
}
.overlay * { pointer-events: auto; }

@keyframes gradientShift { 0%, 100% { background: linear-gradient(45deg, rgba(255,0,150,0.2), rgba(0,204,255,0.2)); } 50% { background: linear-gradient(45deg, rgba(0,255,150,0.2), rgba(255,204,0,0.2)); } }

.typing-container { text-align: center; padding-top: 0px; }
#typingText { font-size: 2.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 10px #ff00ff, 0 0 20px #00ffff; min-height: 100px; }
.cursor { display: inline-block; width: 3px; background-color: #fff; animation: blink 1s infinite; }
@keyframes blink { 50% { opacity: 0; } }

#unmuteBtn { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); padding: 18px 35px; font-size: 1.3rem; font-weight: bold; border: none; border-radius: 50px; background: linear-gradient(90deg, #ff0080, #7928ca); color: #fff; cursor: pointer; z-index: 10; box-shadow: 0 0 20px #ff0080; animation: pulseBtn 2s infinite; }

.popup-text { position: absolute; top: 50%; left: 50%; transform: translate(-50%, -50%); font-size: 5.5rem; font-weight: 900; color: #fff; text-shadow: 0 0 15px #ff0080, 0 0 30px #7928ca; opacity: 0; transition: opacity 1s ease-in-out; pointer-events: none; text-align: center; background: linear-gradient(90deg, #ff0080, #ff8c00, #00ffff); -webkit-background-clip: text; -webkit-text-fill-color: transparent; z-index: 5; }
.popup-text.show { opacity: 1; animation: pulseText 2s infinite; }
@keyframes pulseText { 0%, 100% { transform: translate(-50%, -50%) scale(1); } 50% { transform: translate(-50%, -50%) scale(1.1); } }

.marquee { width: 100%; overflow: hidden; white-space: nowrap; padding: 5px 0; }
.marquee span { display: inline-block; padding-left: 100%; animation: marquee 13s linear infinite; font-size: 2.5rem; font-weight: bold; color: #fff; text-shadow: 0 0 20px #00ff00, 0 0 20px #00ff00; }
@keyframes marquee { 0% { transform: translate(0, 0); } 100% { transform: translate(-100%, 0); } }

/* Modal Keranjang */
.modal {
    display: none;
    position: fixed;
    top: 0; left: 0;
    width: 100%; height: 100%;
    background: rgba(0,0,0,0.85);
    z-index: 100;
    justify-content: center;
    align-items: center;
    backdrop-filter: blur(5px);
    padding: 20px;
}
.modal.show { display: flex; }
.modal-content {
    background: #1a1a1a;
    padding: 25px;
    border-radius: 20px;
    max-width: 420px;
    width: 100%;
    text-align: left;
    border: 2px solid #ff0080;
    box-shadow: 0 0 30px rgba(255,0,128,0.5);
    animation: popIn 0.3s ease;
    max-height: 90vh;
    overflow-y: auto;
}
@keyframes popIn {
    from { transform: scale(0.8); opacity: 0; }
    to { transform: scale(1); opacity: 1; }
}
.modal-content img {
    width: 100%;
    max-height: 200px;
    object-fit: cover;
    border-radius: 12px;
    margin-bottom: 15px;
}
.modal-content h3 {
    font-size: 1.6rem;
    margin-bottom: 8px;
    color: #ff0080;
    text-align: center;
}
.modal-content .price {
    font-size: 1.4rem;
    margin-bottom: 15px;
    color: #00ff88;
    font-weight: bold;
    text-align: center;
}
.modal-content .info {
    font-size: 0.95rem;
    margin-bottom: 15px;
    color: #ccc;
    line-height: 1.5;
    text-align: center;
}
.modal-content label {
    display: block;
    font-size: 0.9rem;
    color: #aaa;
    margin-bottom: 5px;
    margin-top: 10px;
}
.modal-content input, .modal-content textarea {
    width: 100%;
    padding: 10px;
    background: #2a2a2a;
    border: 1px solid #444;
    border-radius: 8px;
    color: #fff;
    font-size: 14px;
}
.modal-content textarea {
    height: 60px;
    resize: vertical;
}
.modal-content .btn-wa {
    display: block;
    width: 100%;
    padding: 15px;
    background: linear-gradient(90deg, #25D366, #128C7E);
    color: #fff;
    text-decoration: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1.1rem;
    margin-top: 15px;
    text-align: center;
    opacity: 1;
    pointer-events: auto;
    transition: 0.2s;
}
.modal-content .btn-wa.disabled {
    opacity: 0.5;
    pointer-events: none;
}
.modal-content .btn-share {
    display: block;
    width: 100%;
    padding: 14px;
    background: linear-gradient(90deg, #00c3ff, #7928ca);
    color: #fff;
    border: none;
    border-radius: 12px;
    font-weight: bold;
    font-size: 1rem;
    cursor: pointer;
    margin-top: 10px;
}
.modal-content .btn-close {
    background: #333;
    padding: 12px;
    width: 100%;
    border: none;
    border-radius: 12px;
    color: #fff;
    cursor: pointer;
    margin-top: 10px;
}

@media (max-width: 768px) {
    #typingText { font-size: 1.8rem; }
   .popup-text { font-size: 3.5rem; }
   .marquee span { font-size: 1.8rem; }
    #unmuteBtn { font-size: 1.1rem; padding: 15px 28px; }
}
</style>
</head>
<body>

<video id="bgVideo" autoplay muted loop playsinline>
    <source src="https://www.dropbox.com/scl/fi/4yiz3d74dpa04og5tct3u/video3.mp4?rlkey=fvve3qmxh8mtu1csszsr3ljm8&st=5jnoqf25&dl=1" type="video/mp4">
</video>

<div class="overlay">
<div class="typing-container">
<span id="typingText"></span><span class="cursor">|</span>
</div>
<button id="unmuteBtn">🔊</button>
<div class="popup-text" id="popupText">AFILIATE12</div>
<div class="marquee">
<span>🔥 Nikmati Video Pilihan Terbaik 🔥 Santai & Relax 🔥 Update Tiap Hari 🔥</span>
</div>
</div>

<!-- Modal Keranjang -->
<div class="modal" id="cartModal">
    <div class="modal-content">
        <img src="" alt="Produk Premium" onerror="this.style.display='none'">
        <h3>🛒 Produk Premium</h3>
        <div class="price">Rp 99.000</div>
        <div class="info">Silakan isi data di bawah ini sebelum order via WhatsApp</div>
        
        <label>Nama Lengkap</label>
        <input type="text" id="custName" placeholder="Contoh: Budi Santoso" oninput="validateForm()">
        
        <label>Alamat Lengkap (Google Maps)</label>
        <textarea id="custAddress" placeholder="Contoh: Jl. Mawar No. 10, Jakarta" oninput="validateForm()"></textarea>
        
        <label>Kode Pengiklan (Tau Produk Ini Dari Mana)</label>
        <input type="text" id="adCode" placeholder="Contoh: ADS001" oninput="validateForm()">
        
        <a href="#" id="waLink" class="btn-wa disabled" target="_blank">*PESAN SEKARANG*</a>
        <button class="btn-share" onclick="shareLink()">BAGIKAN</button>
        <button class="btn-close" onclick="closeModal()">X</button>
    </div>
</div>

<script>
const video = document.getElementById('bgVideo');
const unmuteBtn = document.getElementById('unmuteBtn');
const modal = document.getElementById('cartModal');
const waLink = document.getElementById('waLink');
const textArray = ["Selamat Datang di Bioskop Mini","Putar Video Favoritmu","Layar Penuh Tanpa Gangguan","Enjoy The Show!"];
let textIndex = 0; let charIndex = 0; let isDeleting = false;
const typingElement = document.getElementById('typingText');

const currentURL = window.location.href;
const waNumber = '6281234567890';
const productName = 'Produk Premium';
const productPrice = 'Rp 99.000';
const shareText = `Cek produk keren ini: Produk Premium - Rp 99.000\n${currentURL}`;

// Klik video buka popup
video.addEventListener('click', () => {
    modal.classList.add('show');
    validateForm();
});

// Klik tombol suara
unmuteBtn.addEventListener('click', (e) => { 
    e.stopPropagation();
    video.muted = false; 
    video.play(); 
    unmuteBtn.style.display = 'none'; 
});

function closeModal() {
    modal.classList.remove('show');
}

function validateForm() {
    const name = document.getElementById('custName').value.trim();
    const address = document.getElementById('custAddress').value.trim();
    const adCode = document.getElementById('adCode').value.trim();
    
    if(name && address && adCode) {
        const message = `Halo Admin, saya mau pesan:
        
Nama: ${name}
Produk: Produk Premium
Harga: Rp 99.000
Alamat: ${address}
Kode Iklan: ${adCode}`;
        
        waLink.href = `https://wa.me/${waNumber}?text=${encodeURIComponent(message)}`;
        waLink.classList.remove('disabled');
    } else {
        waLink.href = '#';
        waLink.classList.add('disabled');
    }
}

function shareLink() {
    const shareTextFinal = `Cek produk keren ini: Produk Premium - Rp 99.000\n${currentURL}`;
    if (navigator.share) {
        navigator.share({
            title: 'Produk Premium',
            text: shareTextFinal,
            url: currentURL
        }).catch(err => console.log('Share gagal:', err));
    } else {
        navigator.clipboard.writeText(shareTextFinal).then(() => {
            alert('Link berhasil disalin!');
        });
    }
}

// Tutup modal kalau klik di luar
modal.addEventListener('click', (e) => {
    if(e.target === modal) closeModal();
});

function typeEffect() {
const currentText = textArray[textIndex];
if (isDeleting) { typingElement.textContent = currentText.substring(0, charIndex--); }
else { typingElement.textContent = currentText.substring(0, charIndex++); }
if (!isDeleting && charIndex === currentText.length + 1) { isDeleting = true; setTimeout(typeEffect, 1500); }
else if (isDeleting && charIndex === 0) { isDeleting = false; textIndex = (textIndex + 1) % textArray.length; setTimeout(typeEffect, 300); }
else { setTimeout(typeEffect, isDeleting? 50 : 100); }
}

const popup = document.getElementById('popupText');
function showPopup() { popup.classList.add('show'); setTimeout(() => { popup.classList.remove('show'); }, 3000); }

setTimeout(() => { showPopup(); setInterval(showPopup, 10000); }, 2000);
document.addEventListener('DOMContentLoaded', () => { setTimeout(typeEffect, 1000); });
</script>
</body>
</html>
